<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
    overflow: hidden;
    background: url('https://i.imgur.com/8Km9tLL.jpg') no-repeat center center fixed;
    background-size: cover;
}

.page {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
}

.hidden { display: none; }

h1 {
    text-shadow: 2px 2px 10px black;
}

button {
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    margin-top: 20px;
    font-size: 18px;
}

/* hearts */
.heart {
    position: fixed;
    top: -50px;
    font-size: 24px;
    animation: fall linear infinite;
}

@keyframes fall {
    100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page">
    <h2>Enter Name 💖</h2>
    <input id="name" placeholder="Enter Name"><br>
    <button onclick="login()">Enter 💕</button>
</div>

<!-- SCREEN 1 -->
<div id="p1" class="page hidden">
    <h1>Hi Cutie 💖</h1>
    <button onclick="next(2)">Next 💜</button>
</div>

<!-- SCREEN 2 -->
<div id="p2" class="page hidden">
    <h1>This special day for my cutie 💖</h1>
    <button onclick="next(3)">Next 💜</button>
</div>

<!-- SCREEN 3 -->
<div id="p3" class="page hidden">
    <h1>Happy Birthday Cutie 🎂💖</h1>
    <button onclick="next(4)">Next 💜</button>
</div>

<!-- SCREEN 4 -->
<div id="p4" class="page hidden">
    <h1 style="font-size:40px;">I LIKE U CUTIE 💖</h1>
    <p>
        Teri smile meri jaan hai 💖<br>
        Tu hi meri pehchaan hai 💕<br>
        Tu mile toh sab kuch mile 😘
    </p>
</div>

<script>
function login() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("p1").classList.remove("hidden");
}

function next(n) {
    document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
    document.getElementById("p"+n).classList.remove("hidden");
}

/* hearts */
setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random()*100 + "vw";
    h.style.animationDuration = (3+Math.random()*5)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},300);
</script>

</body>
</html>
